<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMF Camp 2026 — Schedule Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* EMF 2026 official palette */
    --emf-orange:     #F77F02;
    --emf-coral:      #F5515E;
    --emf-yellow:     #F9E200;
    --emf-green:      #2AE28C;
    --emf-light-blue: #2EADD9;
    --emf-mid-blue:   #005D96;
    --emf-dark-blue:  #000730;

    /* Dark theme mappings */
    --bg:          #000a1a;
    --surface:     #001228;
    --surface-2:   #001e3a;
    --border:      #0a3060;
    --accent:      #F77F02;
    --accent-dim:  #c96300;
    --accent-glow: rgba(247,127,2,0.15);
    --text-1:      #e8edf5;
    --text-2:      #8aa8cc;
    --text-3:      #4a6fa0;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.75;
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 48px;
    background:
      linear-gradient(rgba(0,7,48,0.88), rgba(0,7,48,0.88)),
      url('https://www.emfcamp.org/static/images/main_images/004-21400868dbd3f9a5d4066374835203da.jpg') center/cover no-repeat;
    border-bottom: 1px solid var(--emf-mid-blue);
    display: flex;
    align-items: center;
  }

  .header-inner {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    height: 26px;
    width: auto;
    flex-shrink: 0;
    display: block;
  }

  .header-title {
    font-family: 'Raleway', 'Inter', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--emf-orange);
    letter-spacing: 0.04em;
  }

  .header-sep {
    color: var(--text-3);
  }

  .header-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Main content */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Filter section */
  .filter-section {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0 8px;
  }

  .section-label {
    flex-shrink: 0;
    white-space: nowrap;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-top: 7px;
    margin-bottom: 0;
  }

  #tag-cloud {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .filter-section-body {
    flex: 1;
    min-width: 0;
  }

  #type-cloud-row {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 5px;
  }

  #type-cloud {
    display: flex;
    flex-wrap: nowrap;
    gap: 5px;
  }

  #type-cloud .tag-pill {
    min-width: 0;
    justify-content: space-between;
    white-space: nowrap;
    padding: 6px 9px;
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    user-select: none;
  }

  .tag-pill:hover {
    background: var(--surface-2);
    color: var(--text-1);
  }

  .tag-pill.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent);
  }

  .tag-pill .count {
    color: var(--text-3);
  }

  .tag-pill.active .count {
    color: var(--accent);
  }

  .tag-pill-all {
    border-color: var(--border);
  }

  .tag-pill-all.has-selection {
    border-color: var(--accent-dim);
    color: var(--accent-dim);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
  }

  .status-text {
    flex: 1;
  }

  .clear-btn {
    background: none;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-3);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 120ms ease, background 120ms ease;
    letter-spacing: 0.04em;
  }

  .clear-btn:hover {
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Event list */
  #event-list {
    padding-bottom: 40vh;
  }

  .event-article {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms ease;
    position: relative;
  }

  .event-article::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 120ms ease;
  }

  .event-article:hover::before {
    background: var(--accent);
  }

  .event-article:hover {
    background: #002040;
  }

  .event-article:hover .event-title {
    color: #ffffff;
  }

  .event-article:hover .details-description {
    color: var(--text-1);
  }

  .event-row {
    display: grid;
    grid-template-columns: 120px auto 1fr auto auto;
    align-items: start;
    gap: 12px;
    padding: 10px 0 10px 12px;
  }

  .event-speaker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    padding-top: 3px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }

  .event-type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding-top: 2px;
    white-space: nowrap;
  }

  .event-type-badge.talk        { color: var(--emf-light-blue); }
  .event-type-badge.workshop    { color: var(--emf-green); }
  .event-type-badge.performance { color: var(--emf-coral); }
  .event-type-badge.film        { color: var(--emf-yellow); }
  .event-type-badge.music       { color: #b57bee; }
  .event-type-badge.other       { color: var(--text-3); }

  .event-main {
    min-width: 0;
  }

  .event-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.3;
    margin-bottom: 3px;
    word-break: break-word;
  }

  .event-short-desc {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60ch;
  }

  .event-article.expanded .event-short-desc { display: none; }
  .event-article:not(.expanded) .event-row-tags { display: none; }

  .event-row-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .event-tag-slug {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .event-tag-slug + .event-tag-slug::before {
    content: '·';
    margin-right: 4px;
    color: var(--text-3);
  }

  .event-chevron {
    font-size: 12px;
    color: var(--text-3);
    padding-top: 2px;
    padding-right: 8px;
    transition: color 120ms ease;
    flex-shrink: 0;
  }

  .event-article:hover .event-chevron {
    color: var(--accent);
  }

  /* Expand/collapse */
  .details {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 240ms ease-out, opacity 180ms ease;
  }

  .event-article.expanded .details {
    max-height: 600px;
    opacity: 1;
  }

  .event-article.expanded .event-chevron::after {
    content: '▾';
  }

  .event-chevron::after {
    content: '▸';
  }

  .details-inner {
    padding: 0 16px 16px 144px;
    margin-left: 12px;
    margin-bottom: 4px;
  }

  .details-description {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    color: var(--text-2);
    line-height: 1.75;
    margin-bottom: 12px;
    white-space: pre-line;
  }

  .details-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text-3);
  }

  .details-meta span strong {
    color: var(--text-2);
    font-weight: 400;
  }

  .details-link {
    font-size: 12px;
    color: var(--accent-dim);
    text-decoration: none;
    letter-spacing: 0.04em;
  }

  .details-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }

  .details-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }

  .details-tag {
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
  }

  /* Empty state */
  .empty-state {
    padding: 48px 0;
    font-size: 14px;
    color: var(--text-3);
  }

  .cursor-blink {
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .tag-pill.disabled {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
  }

  .tag-pill.fave-active {
    background: rgba(249,226,0,0.12);
    color: var(--emf-yellow);
    border-color: var(--emf-yellow);
  }

  .tag-pill.fave-active .count {
    color: var(--emf-yellow);
  }

  /* Favourites help */
  #fave-help {
    padding: 6px 0 8px;
    border-bottom: 1px solid var(--border);
  }

  #fave-help-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    cursor: pointer;
    user-select: none;
    background: none;
    border: none;
    padding: 0;
  }

  #fave-help-toggle:hover { color: var(--emf-yellow); }

  #fave-help-toggle::after {
    content: '▸';
    font-size: 9px;
    transition: transform 120ms ease;
  }

  #fave-help.open #fave-help-toggle::after { transform: rotate(90deg); }

  #fave-help-body {
    display: none;
    margin-top: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.7;
  }

  #fave-help.open #fave-help-body { display: block; }

  .bookmarklet-link {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px dashed var(--emf-yellow);
    background: rgba(249,226,0,0.08);
    color: var(--emf-yellow);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-decoration: none;
    cursor: grab;
  }

  .bookmarklet-link:hover { background: rgba(249,226,0,0.15); }

  mark {
    background: rgba(247, 127, 2, 0.15);
    color: var(--text-2);
    border-radius: 2px;
    padding: 0 1px;
    font-weight: 500;
  }

  .event-article:not(.expanded) mark {
    background: none;
    color: inherit;
    font-weight: inherit;
    padding: 0;
  }

  /* Heart icon on favourited events */
  .event-heart {
    display: inline-flex;
    align-items: center;
    padding-top: 1px;
    padding-right: 2px;
    font-size: 15px;
    color: var(--emf-coral);
    opacity: 0.55;
    text-decoration: none;
    line-height: 1;
    transition: opacity 120ms ease, transform 120ms ease;
    flex-shrink: 0;
  }

  .event-heart:hover {
    opacity: 1;
    transform: scale(1.15);
  }

  /* View Favourites toggle button */
  #view-fave-btn {
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    background: none;
    border: 1px solid var(--emf-yellow);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--emf-yellow);
    opacity: 0.6;
    transition: opacity 120ms ease, background 120ms ease;
  }

  #view-fave-btn:hover {
    opacity: 1;
    background: rgba(249,226,0,0.10);
  }

  #view-fave-btn.fave-active {
    opacity: 1;
    background: rgba(249,226,0,0.15);
    border-color: var(--emf-yellow);
  }

  /* Tablet: 600–899px */
  @media (min-width: 600px) and (max-width: 899px) {
    .event-row { grid-template-columns: 100px auto 1fr auto auto; }
    .details-inner { padding: 0 12px 14px 120px; margin-left: 0; }
  }

  /* Phone: < 600px */
  @media (max-width: 599px) {
    .container, .header-inner { padding: 0 12px; }

    header { height: auto; padding: 10px 0; }
    .header-subtitle { display: none; }

    .filter-section { flex-direction: column; gap: 0; padding: 0; }
    .section-label {
      padding-top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      cursor: pointer;
      user-select: none;
    }
    .section-label::after {
      content: '▾';
      font-size: 12px;
      color: var(--text-3);
      transition: transform 180ms ease;
    }
    .filter-section.collapsed .section-label::after {
      content: '▸';
    }
    .filter-section-body {
      max-height: 600px;
      overflow: hidden;
      transition: max-height 240ms ease-out;
      padding-bottom: 6px;
    }
    .filter-section.collapsed .filter-section-body {
      max-height: 0;
      padding-bottom: 0;
    }

    #type-cloud-row { flex-wrap: wrap; }
    #type-cloud { width: 100%; flex-wrap: wrap; }
    #type-cloud .tag-pill { min-width: 0; flex: none; justify-content: flex-start; }

    .tag-pill { padding: 8px 10px; font-size: 11px; min-height: 36px; }

    .event-article { min-height: 44px; }
    .event-row {
      grid-template-columns: 1fr auto auto;
      grid-template-rows: auto auto;
      padding: 10px 0 10px 8px;
      gap: 4px 6px;
    }
    .event-type-badge { grid-column: 1; grid-row: 1; font-size: 10px; }
    .event-main { grid-column: 1; grid-row: 2; }
    .event-speaker { display: none; }
    .event-heart { grid-column: 2; grid-row: 1; align-self: center; font-size: 13px; }
    .event-chevron { align-self: center; padding-right: 4px; grid-column: 3; grid-row: 1 / span 2; }

    .details-inner { padding: 0 8px 12px 8px; margin-left: 0; }
    .details-description { font-size: 14px; }
    .details-meta { font-size: 12px; gap: 8px; }

    #tag-cloud .tag-pill.disabled { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img class="header-logo" src="https://www.emfcamp.org/static/images/brand/2026/emf2026-logo-white-gradient.svg" alt="EMF Camp 2026">
    <span class="header-title">EMF 2026</span>
    <span class="header-sep">—</span>
    <span class="header-subtitle">Schedule Browser</span>
  </div>
</header>

<div class="container">
  <div class="filter-section" id="type-filter-section">
    <div class="section-label">Filter by type</div>
    <div class="filter-section-body">
      <div id="type-cloud-row">
        <div id="favourites-bar" style="display:none"><button id="fave-btn" class="tag-pill"></button></div>
        <div id="type-cloud"></div>
      </div>
    </div>
  </div>

  <section class="filter-section" id="tag-filter-section">
    <div class="section-label">Filter by Topic</div>
    <div class="filter-section-body"><div id="tag-cloud"></div></div>
  </section>

  <div id="fave-help">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button id="fave-help-toggle">★ sync favourites</button>
      <button id="view-fave-btn"></button>
    </div>
    <div id="fave-help-body">
      <p style="margin-bottom:10px">
        1. Drag
        <a class="bookmarklet-link" href="javascript:(function(){fetch('https://www.emfcamp.org/schedule/2026.json',{credentials:'include'}).then(function(r){return r.json()}).then(function(d){var ids=d.filter(function(e){return e.is_fave}).map(function(e){return e.id});if(!ids.length){alert('No favourites found. Make sure you are logged in to emfcamp.org.');return;}location.href='https://robmckinnon.github.io/emf2026/?favourites='+ids.join(',');}).catch(function(){alert('Failed to fetch schedule. Make sure you are logged in to emfcamp.org.');})})();">★ EMF Favourites</a>
        to your bookmarks bar.
      </p>
      <p>2. Go to <strong style="color:var(--text-1)">emfcamp.org</strong> while logged in, then click the bookmark — it will open this page filtered to your starred talks.</p>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-text" id="status-text"></span>
    <button class="clear-btn" id="clear-btn" style="display:none">[ × clear all ]</button>
  </div>

  <div id="event-list"></div>
</div>

// --- Favourites from URL ---
const favouriteIds = (function() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('favourites');
  if (!raw) return new Set();
  return new Set(raw.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)));
})();

// --- State ---
let selectedTypes = new Set();
let selectedTags = new Set();
let expandedIds = new Set();
let showFavouritesOnly = false;

// --- Tag matching ---
function escapeKeyword(kw) {
  return kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function tagEvent(event, tagMapping) {
  const text = (event.title + ' ' + event.description).toLowerCase();
  const matched = [];
  for (const [tag, keywords] of Object.entries(tagMapping)) {
    for (const kw of keywords) {
      const hit = kw.includes(' ')
        ? text.includes(kw)
        : new RegExp('\\b' + escapeKeyword(kw) + '\\b').test(text);
      if (hit) { matched.push(tag); break; }
    }
  }
  return matched.length ? matched : ['untagged'];
}

// --- Build indexes ---
function buildTagIndex(events, tagMapping) {
  const index = new Map();
  for (const event of events) {
    index.set(event.id, tagEvent(event, tagMapping));
  }
  return index;
}

function buildTagCounts(tagIndex) {
  const counts = new Map();
  for (const tags of tagIndex.values()) {
    for (const tag of tags) {
      counts.set(tag, (counts.get(tag) || 0) + 1);
    }
  }
  return counts;
}

// --- Filtering helper ---
function eventMatchesFilters(event, tagIndex, selectedTypes, selectedTags) {
  if (showFavouritesOnly && !favouriteIds.has(event.id)) return false;
  if (selectedTypes.size > 0 && !selectedTypes.has(event.type)) return false;
  if (selectedTags.size > 0) {
    const tags = tagIndex.get(event.id) || [];
    if (![...selectedTags].every(t => tags.includes(t))) return false;
  }
  return true;
}

function computeDynamicCounts(events, tagIndex, selectedTypes, selectedTags) {
  if (selectedTypes.size === 0 && selectedTags.size === 0 && !showFavouritesOnly) return tagCounts;
  const result = new Map();
  for (const tag of tagCounts.keys()) {
    if (selectedTags.has(tag)) {
      // Active tag: count events matching current full filter
      result.set(tag, events.filter(e => eventMatchesFilters(e, tagIndex, selectedTypes, selectedTags)).length);
    } else {
      // Unselected tag: count events that would match if this tag were added
      const hypotheticalTags = new Set([...selectedTags, tag]);
      result.set(tag, events.filter(e => eventMatchesFilters(e, tagIndex, selectedTypes, hypotheticalTags)).length);
    }
  }
  return result;
}

function buildTypeCounts(events) {
  const counts = new Map();
  for (const event of events) {
    const t = event.type;
    counts.set(t, (counts.get(t) || 0) + 1);
  }
  return counts;
}

function computeTypeCounts(events, tagIndex, selectedTypes, selectedTags) {
  const counts = new Map();
  const allTypes = [...new Set(events.map(e => e.type))];
  for (const type of allTypes) {
    if (selectedTypes.has(type)) {
      // Active: show count of events matching current full filter
      counts.set(type, events.filter(e => eventMatchesFilters(e, tagIndex, selectedTypes, selectedTags)).length);
    } else if (selectedTypes.size > 0) {
      // Another type selected — types are mutually exclusive, intersection = 0
      counts.set(type, 0);
    } else {
      // No type selected: show count for just this type with current tag filter
      const hypotheticalTypes = new Set([type]);
      counts.set(type, events.filter(e => eventMatchesFilters(e, tagIndex, hypotheticalTypes, selectedTags)).length);
    }
  }
  return counts;
}

function typeDisplayName(type) {
  if (!type) return 'OTHER';
  const t = type.toLowerCase();
  if (t === 'talk') return 'TALK';
  if (t === 'workshop') return 'WORKSHOP';
  if (t === 'performance') return 'PERFORMANCE';
  return type.toUpperCase();
}

function typeColor(type) {
  if (!type) return 'var(--text-3)';
  const t = type.toLowerCase();
  if (t === 'talk')        return 'var(--emf-light-blue)';
  if (t === 'workshop')    return 'var(--emf-green)';
  if (t === 'performance') return 'var(--emf-coral)';
  if (t === 'film')        return 'var(--emf-yellow)';
  if (t === 'music')       return '#b57bee';
  return 'var(--text-3)';
}

function renderTypeCloud(events, tagIndex, selectedTypes, selectedTags) {
  const cloud = document.getElementById('type-cloud');
  cloud.innerHTML = '';

  const dynCounts = computeTypeCounts(events, tagIndex, selectedTypes, selectedTags);
  const TYPE_ORDER = ['performance', 'talk', 'workshop'];
  const allTypes = [...new Set(events.map(e => e.type))].sort((a, b) => {
    const ai = TYPE_ORDER.indexOf(a);
    const bi = TYPE_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  for (const type of allTypes) {
    const count = dynCounts.get(type) ?? 0;
    const isActive = selectedTypes.has(type);
    const isDisabled = !isActive && count === 0;

    const btn = document.createElement('button');
    btn.className = 'tag-pill' + (isActive ? ' active' : '') + (isDisabled ? ' disabled' : '');
    btn.dataset.type = type;
    if (isActive) {
      btn.style.color = typeColor(type);
      btn.style.borderColor = typeColor(type);
    } else {
      btn.style.color = typeColor(type);
    }

    const labelSpan = document.createElement('span');
    labelSpan.textContent = typeDisplayName(type);

    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = '(' + count + ')';
    if (isActive) countSpan.style.color = typeColor(type);

    btn.appendChild(labelSpan);
    btn.appendChild(countSpan);
    btn.addEventListener('click', () => handleTypeClick(type));
    cloud.appendChild(btn);
  }
}

function handleTypeClick(typeName) {
  if (selectedTypes.has(typeName)) selectedTypes.delete(typeName);
  else selectedTypes.add(typeName);
  renderTypeCloud(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
  renderTagCloud(tagCounts, selectedTags);
  renderEventList(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
  updateStatusBar();
  updateMobileCollapse();
}

// --- Rendering ---
function renderTagCloud(tagCounts, selectedTags) {
  const cloud = document.getElementById('tag-cloud');
  cloud.innerHTML = '';

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'tag-pill tag-pill-all' + (selectedTags.size > 0 ? ' has-selection' : '');
  allBtn.textContent = 'ALL';
  allBtn.addEventListener('click', () => {
    selectedTags.clear();
    renderTagCloud(tagCounts, selectedTags);
    renderEventList(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
    updateStatusBar();
  });
  cloud.appendChild(allBtn);

  const dynamicCounts = computeDynamicCounts(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);

  // Sort: active first, then by dynamic count desc
  const sorted = [...tagCounts.entries()].sort((a, b) => {
    const aActive = selectedTags.has(a[0]) ? 1 : 0;
    const bActive = selectedTags.has(b[0]) ? 1 : 0;
    if (aActive !== bActive) return bActive - aActive;
    const aDyn = dynamicCounts.get(a[0]) ?? 0;
    const bDyn = dynamicCounts.get(b[0]) ?? 0;
    return bDyn - aDyn;
  });

  for (const [tag, _staticCount] of sorted) {
    const dynCount = dynamicCounts.get(tag) ?? 0;
    const isActive = selectedTags.has(tag);
    const isDisabled = !isActive && dynCount === 0;

    const btn = document.createElement('button');
    btn.className = 'tag-pill' + (isActive ? ' active' : '') + (isDisabled ? ' disabled' : '');
    btn.dataset.tag = tag;

    const labelSpan = document.createElement('span');
    labelSpan.textContent = tag;

    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = '(' + dynCount + ')';

    btn.appendChild(labelSpan);
    btn.appendChild(countSpan);
    btn.addEventListener('click', () => handleTagClick(tag));
    cloud.appendChild(btn);
  }
}

function formatType(type) {
  if (!type) return 'OTHER';
  return type.toUpperCase();
}

function typeClass(type) {
  if (!type) return 'other';
  const t = type.toLowerCase();
  if (t === 'talk')        return 'talk';
  if (t === 'workshop')    return 'workshop';
  if (t === 'performance') return 'performance';
  if (t === 'film')        return 'film';
  if (t === 'music')       return 'music';
  return 'other';
}

function renderEventList(events, tagIndex, selectedTypes, selectedTags) {
  const list = document.getElementById('event-list');
  list.innerHTML = '';

  const filtered = (selectedTypes.size === 0 && selectedTags.size === 0 && !showFavouritesOnly)
    ? [...events]
    : events.filter(e => eventMatchesFilters(e, tagIndex, selectedTypes, selectedTags));

  filtered.sort((a, b) => {
    const aTitle = stripEmoji(a.title).trim();
    const bTitle = stripEmoji(b.title).trim();
    const isOpening = t => t === 'Opening Ceremony';
    const isClosing = t => t === 'Closing Ceremony';
    if (isOpening(aTitle) && !isOpening(bTitle)) return -1;
    if (isOpening(bTitle) && !isOpening(aTitle)) return 1;
    if (isClosing(aTitle) && !isClosing(bTitle)) return 1;
    if (isClosing(bTitle) && !isClosing(aTitle)) return -1;
    return aTitle.localeCompare(bTitle);
  });

  if (filtered.length === 0) {
    const tagList = [...selectedTags].join(', ');
    list.innerHTML = `<div class="empty-state">&gt; no results for [${tagList}]<span class="cursor-blink">_</span></div>`;
    return filtered.length;
  }

  for (const event of filtered) {
    const tags = tagIndex.get(event.id) || ['untagged'];
    const isExpanded = expandedIds.has(event.id);

    const article = document.createElement('article');
    article.className = 'event-article' + (isExpanded ? ' expanded' : '');
    article.dataset.id = event.id;

    // Row
    const row = document.createElement('div');
    row.className = 'event-row';

    const badge = document.createElement('div');
    badge.className = 'event-type-badge ' + typeClass(event.type);
    badge.textContent = formatType(event.type);

    const main = document.createElement('div');
    main.className = 'event-main';

    const title = document.createElement('div');
    title.className = 'event-title';

    // Compute highlight keywords once for both title and description
    const highlightKws = [];
    if (selectedTags.size > 0) {
      for (const tag of selectedTags) {
        const kws = TAG_MAPPING[tag];
        if (kws) highlightKws.push(...kws);
      }
    }

    if (highlightKws.length) {
      title.innerHTML = highlightKeywords(event.title || '', highlightKws);
    } else {
      title.textContent = event.title;
    }

    const rowTags = document.createElement('div');
    rowTags.className = 'event-row-tags';
    const displayTags = tags.slice(0, 5);
    for (const tag of displayTags) {
      const slug = document.createElement('span');
      slug.className = 'event-tag-slug';
      slug.textContent = tag;
      rowTags.appendChild(slug);
    }

    const shortDesc = document.createElement('div');
    shortDesc.className = 'event-short-desc';
    shortDesc.textContent = event.short_description || '';

    main.appendChild(title);
    main.appendChild(shortDesc);
    main.appendChild(rowTags);

    const speaker = document.createElement('div');
    speaker.className = 'event-speaker';
    if (event.names) speaker.textContent = event.names;

    const chevron = document.createElement('div');
    chevron.className = 'event-chevron';

    row.appendChild(badge);

    if (favouriteIds.has(event.id)) {
      const heart = document.createElement('a');
      heart.className = 'event-heart';
      heart.href = event.link;
      heart.target = '_blank';
      heart.rel = 'noopener noreferrer';
      heart.title = 'View on emfcamp.org';
      heart.textContent = '♥';
      heart.addEventListener('click', e => e.stopPropagation());
      row.appendChild(heart);
    }

    row.appendChild(main);
    row.appendChild(speaker);
    row.appendChild(chevron);

    // Details
    const details = document.createElement('div');
    details.className = 'details';

    const inner = document.createElement('div');
    inner.className = 'details-inner';

    const desc = document.createElement('div');
    desc.className = 'details-description';
    if (highlightKws.length) {
      desc.innerHTML = highlightKeywords(normalizeDescription(event.description), highlightKws);
    } else {
      desc.textContent = normalizeDescription(event.description);
    }

    const meta = document.createElement('div');
    meta.className = 'details-meta';

    if (event.names) {
      const sp = document.createElement('span');
      sp.innerHTML = '<strong>' + escapeHTML(event.names) + '</strong>'
        + (event.pronouns ? ' <span style="color:var(--text-3)">(' + escapeHTML(event.pronouns) + ')</span>' : '');
      meta.appendChild(sp);
    }

    inner.appendChild(desc);
    if (meta.children.length) inner.appendChild(meta);

    if (event.link) {
      const linkEl = document.createElement('a');
      linkEl.className = 'details-link';
      linkEl.href = event.link;
      linkEl.target = '_blank';
      linkEl.rel = 'noopener noreferrer';
      linkEl.textContent = '→ ' + event.link;
      inner.appendChild(linkEl);
    }

    if (tags.length) {
      const detailTags = document.createElement('div');
      detailTags.className = 'details-tags';
      for (const tag of tags) {
        const t = document.createElement('span');
        t.className = 'details-tag';
        t.textContent = tag;
        detailTags.appendChild(t);
      }
      inner.appendChild(detailTags);
    }

    details.appendChild(inner);
    article.appendChild(row);
    article.appendChild(details);

    article.addEventListener('click', () => handleEventClick(event.id));

    list.appendChild(article);
  }

  return filtered.length;
}

function stripEmoji(str) {
  return str
    .replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '')
    .replace(/^["\s]+/, '')
    .trim();
}

function normalizeDescription(text) {
  return (text || '')
    .replace(/\r\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function escapeHTML(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function highlightKeywords(text, keywords) {
  if (!keywords.length) return escapeHTML(text);

  // Sort longest-first to avoid shorter keywords masking longer ones
  const sorted = [...keywords].sort((a, b) => b.length - a.length);

  // Find all match ranges
  const ranges = [];
  for (const kw of sorted) {
    const escapedKw = escapeKeyword(kw);
    const pattern = kw.includes(' ')
      ? new RegExp(escapedKw, 'gi')
      : new RegExp('\\b' + escapedKw + '\\b', 'gi');
    let m;
    while ((m = pattern.exec(text)) !== null) {
      ranges.push({ start: m.index, end: m.index + m[0].length });
    }
  }

  if (!ranges.length) return escapeHTML(text);

  // Merge overlapping ranges
  ranges.sort((a, b) => a.start - b.start);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
    const last = merged[merged.length - 1];
    if (ranges[i].start <= last.end) {
      last.end = Math.max(last.end, ranges[i].end);
    } else {
      merged.push(ranges[i]);
    }
  }

  // Build output
  let result = '';
  let pos = 0;
  for (const { start, end } of merged) {
    result += escapeHTML(text.slice(pos, start));
    result += '<mark>' + escapeHTML(text.slice(start, end)) + '</mark>';
    pos = end;
  }
  result += escapeHTML(text.slice(pos));
  return result;
}

function updateStatusBar() {
  const total = SCHEDULE_DATA.length;
  const filtered = (selectedTypes.size === 0 && selectedTags.size === 0 && !showFavouritesOnly)
    ? total
    : SCHEDULE_DATA.filter(e => eventMatchesFilters(e, tagIndex, selectedTypes, selectedTags)).length;

  const statusText = document.getElementById('status-text');
  const clearBtn = document.getElementById('clear-btn');

  statusText.textContent = 'Showing ' + filtered + ' of ' + total + ' events';
  clearBtn.style.display = (selectedTypes.size > 0 || selectedTags.size > 0 || showFavouritesOnly) ? 'inline' : 'none';
}

// --- Event handlers ---
function handleTagClick(tagName) {
  if (selectedTags.has(tagName)) {
    selectedTags.delete(tagName);
  } else {
    selectedTags.add(tagName);
  }
  renderTypeCloud(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
  renderTagCloud(tagCounts, selectedTags);
  renderEventList(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
  updateStatusBar();
  updateMobileCollapse();
}

function handleEventClick(id) {
  const article = document.querySelector('[data-id="' + id + '"]');
  if (!article) return;
  const eventList = document.getElementById('event-list');
  if (expandedIds.has(id)) {
    const top = article.getBoundingClientRect().top;
    expandedIds.delete(id);
    article.classList.remove('expanded');
    const delta = article.getBoundingClientRect().top - top;
    if (delta !== 0) window.scrollBy({ top: delta, behavior: 'instant' });
    eventList.style.paddingBottom = '';
  } else {
    expandedIds.add(id);
    article.classList.add('expanded');
    if (window.innerWidth > 599) {
      requestAnimationFrame(() => {
        const rect = article.getBoundingClientRect();
        if (rect.bottom > window.innerHeight) {
          const HEADER = 60;
          const minScroll = rect.bottom - window.innerHeight + 16;
          const maxScroll = rect.top - HEADER;
          const scrollDelta = Math.min(minScroll, Math.max(maxScroll, 0));
          if (scrollDelta > 0) {
            const newScrollY = window.scrollY + scrollDelta;
            const overflow = newScrollY + window.innerHeight - document.documentElement.scrollHeight;
            if (overflow > 0) {
              eventList.style.paddingBottom = (overflow + 48) + 'px';
              void document.documentElement.scrollHeight; // force reflow before scroll
            }
            window.scrollBy({ top: scrollDelta, behavior: 'instant' });
          }
        }
      });
    }
  }
}

function initMobileCollapse() {
  if (window.matchMedia('(max-width: 599px)').matches) {
    const typeSection = document.getElementById('type-filter-section');
    const tagSection = document.getElementById('tag-filter-section');
    if (typeSection && !typeSection.dataset.collapseInit) {
      typeSection.classList.add('collapsed');
      typeSection.dataset.collapseInit = '1';
      typeSection.querySelector('.section-label').addEventListener('click', () => {
        typeSection.classList.toggle('collapsed');
      });
    }
    if (tagSection && !tagSection.dataset.collapseInit) {
      tagSection.classList.add('collapsed');
      tagSection.dataset.collapseInit = '1';
      tagSection.querySelector('.section-label').addEventListener('click', () => {
        tagSection.classList.toggle('collapsed');
      });
    }
  }
}

function updateMobileCollapse() {
  if (!window.matchMedia('(max-width: 599px)').matches) return;
  const typeSection = document.getElementById('type-filter-section');
  const tagSection = document.getElementById('tag-filter-section');
  if (typeSection && selectedTypes.size > 0) typeSection.classList.remove('collapsed');
  if (tagSection && selectedTags.size > 0) tagSection.classList.remove('collapsed');
}

// --- Init ---
let tagIndex = new Map();
let tagCounts = new Map();

document.getElementById('event-list').innerHTML = '<p style="color:var(--text-3);padding:24px 0">loading schedule…</p>';

fetch('https://www.emfcamp.org/schedule/2026.json')
  .then(r => r.json())
  .then(data => {
    SCHEDULE_DATA = data;
    tagIndex = buildTagIndex(SCHEDULE_DATA, TAG_MAPPING);
    tagCounts = buildTagCounts(tagIndex);
    renderFavouritesBtn();
    renderViewFaveBtn();
    renderTypeCloud(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
    renderTagCloud(tagCounts, selectedTags);
    renderEventList(SCHEDULE_DATA, tagIndex, selectedTypes, selectedTags);
    updateStatusBar();
    initMobileCollapse();
  })
  .catch(() => {
    document.getElementById('event-list').innerHTML = '<p style="color:var(--text-3);padding:24px 0">> failed to load schedule_</p>';
  });
</script>
